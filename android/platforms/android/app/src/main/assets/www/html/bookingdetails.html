<ons-page id="bookingdetails">
        <ons-toolbar>
          <div class="left"><ons-back-button>Back</ons-back-button></div>
          <div id='booking-details-title' class="center" data-i18nbookingdets="Trip Detail">Trip Detail</div>
          <div style='display:none;'><img id="user-image-preload" src=""></div>
        </ons-toolbar>        
              <div class="screen-wrap-white" style="position:relative;overflow: hidden;">

                  <div class="user-details" style="padding:0 15px;background-color: white;" >
                    <div style="display:flex;flex-wrap: nowrap;align-items: center;gap:10px;;width:100%;height:140px;">
                      <div style="display:inline-block;text-align:center;margin: 0 0 0 20px;">
                          <img id="user-image" style='display:block;width:64px;border-radius:50%;' src="img/dummy-user.png">                                                            
                      </div>
                    
                      <div style="width:50%;display:inline-block;margin: 0 20px 0 0;">                    
                          <p id="user-name" style="margin: 3px 0; font-weight:bold"></p>
                          <div><img id="user-rating" style="width:64px;" src=""></div>  
                      </div>
                    </div>                    
                  </div>

                  <div id="booking-details-map" style="height:200px;background-image: url(img/map-placeholder.png);background-size: cover;background-position: center;"></div>

                  <div id="booking-details-data-container" style="width:100%;overflow-x:hidden;overflow-y: auto;position:absolute;top:340px;left:0;height: calc(100% - 140px);backface-visibility:hidden;transition: all 0.3s ease-in-out;transform:translateY(0);">
                      <div style='box-sizing: border-box;width: 100%;overflow: hidden;background-color: white;padding: 10px 20px;border-bottom: solid thin lightgray;'>
                        <div style="border-left: 2px dashed #ccc">
                            <p style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;'>
                                <ons-icon icon='fa-dot-circle' size='18px' style='color: #8bc34a;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="pick-up-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p id="bk-det-waypoint1" style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;display:none;'>
                                <ons-icon icon='fa-circle' size='18px' style='color: orange;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="bk-det-waypoint1-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p id="bk-det-waypoint2" style='margin: 10px 0 30px 0;position: relative;padding-left: 15px;display:none;'>
                                <ons-icon icon='fa-circle' size='18px' style='color: orange;position: absolute;font-size: 17px;left: -9px;top: -3px;background-color: white;'></ons-icon>
                                <span id="bk-det-waypoint2-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                            <p style='margin:0;position: relative;padding-left: 15px;'>
                                <ons-icon icon='fa-square' size='18px' style='color: rgb(250, 75, 75);position: absolute;font-size: 18px;left: -8px;bottom: 0px;border-bottom: 3px solid white;background-color: white;'></ons-icon>
                                <span id="drop-off-address" style='font-size: 16px;width: 100%;display: inline-block;color: black;overflow: hidden;' ></span>                                
                            </p>
                        </div>
                      </div>

                      <div style="position:relative;">
                          <table style="min-height:700px;width:100%;table-layout: fixed;background-color:white;">
                            <tbody>               
                              

                              <tr class="earning-details" style="display:none;" >
                                <td colspan="10">
                                    <p style="color:#8a8a8a;font-size:12px;margin: 5px 0;text-align:center;" data-i18nbookingdets="Trip Earnings">Trip Earnings</p>
                                    <p id='earned-amount' style='font-weight:bold;font-size:22px;margin: 10px 0;text-overflow: ellipsis;overflow: hidden;text-align:center;'>0.00</p>
                                </td>
                              </tr>

                              <tr>
                                  <td colspan="10">
                                      <div style="display: flex;flex-wrap: nowrap;justify-content: space-around;margin: 20px 0 0 0;align-items: center;padding-bottom: 20px;">
                        
                                          <div style="text-align:center;display:inline-block;width:40%">
                                              <div style="display: flex;flex-wrap: nowrap;align-items:center;justify-content: center;"><ons-icon style="color:#00bcd4;font-size:12px;margin-right:3px;" icon='fa-arrows-h' ></ons-icon> <p style="font-size:14px;" data-i18nbookingdets="Distance">Distance</p></div>
                                              <p style="font-size:14px;margin: 0;font-weight: bold;" id="trip-distance">0KM</p>
                                          </div>

                                          <div style="text-align:center;display:inline-block;width:40%;">
                                              <div style="display: flex;flex-wrap: nowrap;align-items:center;justify-content: center;"><ons-icon style="color:#ffc107;font-size:12px;margin-right:3px;" icon='fa-clock' ></ons-icon> <p style="font-size:14px;" data-i18nbookingdets="Time">Time</p></div>
                                              <p style="font-size:14px;margin: 0;font-weight: bold;" id="trip-duration">0S</p>
                                          </div>
                                      </div>
                                  </td>
                              </tr>

                              <tr>
                                  <td colspan="10" style="border-bottom: solid thin lightgray;padding-top: 6px;padding-bottom: 6px 20px;">
                                    <p style="color:#8a8a8a;font-size:12px;margin: 0 0;text-align: center;" data-i18nbookingdets="Vehicle type">Vehicle type</p>
                                    <div style="text-align: center;padding: 5px 0;"><img id="route-ride-image" style="height:50px;" src="img/ride-sample.png"></div>
                                    <p id="selected-ride" style="text-align:center;"></p>
                                  </td>
                              </tr>

                              <tr>
                                <td colspan="10" style="border-bottom: solid thin lightgray;padding: 6px 20px;">
                                  <div>                              
                                    <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookingdets="Requested Date | Time">Requested Date | Time </p>
                                    <p id="puc_dt" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookingdets=""></p>
                                    
                                  </div>
                                </td>
                              </tr>

                              <tr>                              
                                  <td style="border-bottom: solid thin lightgray;padding: 6px 20px;" colspan="10">
                                    <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookingdets="Service Type">Service Type </p>
                                    <p id = "booking-service-type" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookingdets="Taxi">Taxi</p>
                                  </td>            
                              </tr>

                              <tr>                              
                                  <td style="border-bottom: solid thin lightgray;padding: 6px 20px;" colspan="10">
                                    <p id="fare-status" style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookingdets="Fare">Fare </p>
                                    <p id = "bookride_cost" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookingdets=""></p>
                                  </td>            
                              </tr>

                              <!-- <tr>
                                      
                                  <td style="border-bottom: solid thin lightgray;padding: 6px 20px;" colspan="10">
                                      <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookingdets="Coupon">Coupon</p>
                                      <p id = "coupon-code" style="margin: 3px 0;text-overflow: ellipsis;overflow: hidden;" data-i18nbookingdets="None"></p>
                                  </td>
                
                              </tr> -->

                              <tr>
                                    <td colspan="10" style="padding: 6px 20px 30px 20px;">
                                      <p style="color:#8a8a8a;font-size:12px;margin: 0 0" data-i18nbookingdets="Payment method">Payment method</p>
                                      <p id="payment-type" style='margin: 3px 0;' data-i18nbookingdets=""></p>
                                    </td>
                                </tr>
                              </tbody>
                            </table>
                      </div>

                  </div>
              </div> 
            
                      
           
      <script>
        

        var x = document.getElementById("user-image-preload");
        x.onload = function() {
          var y = document.getElementById("user-image");
          y.src = x.src;
        };

        
      
      </script>


</ons-page>
