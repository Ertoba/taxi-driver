workflows:
  ios-unsigned:
    name: Mili Taxi Driver iOS Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - taxi_ios_secrets
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Disable Swift Package Manager
        script: |
          set -e
          flutter config --no-enable-swift-package-manager

      - name: Get Flutter packages
        script: |
          set -e
          flutter clean
          flutter pub get

      - name: Validate Google Maps keys
        script: |
          set -e

          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "GOOGLE_MAPS_API_KEY is missing"
            exit 1
          fi

          if [ -z "$GOOGLE_WEB_SERVICES_KEY" ]; then
            echo "GOOGLE_WEB_SERVICES_KEY is missing"
            exit 1
          fi

          echo "Google Maps key variables are available"

      - name: Configure native Google Maps key
        script: |
          set -e
          /usr/libexec/PlistBuddy \
            -c "Set :GMSApiKey $GOOGLE_MAPS_API_KEY" \
            ios/Runner/Info.plist
          echo "Native Google Maps key configured"

      - name: Configure iOS 16 deployment target
        script: |
          set -e
          sed -i '' -E \
            's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' \
            ios/Runner.xcodeproj/project.pbxproj

          /usr/libexec/PlistBuddy \
            -c "Set :MinimumOSVersion 16.0" \
            ios/Flutter/AppFrameworkInfo.plist

          echo "iOS deployment target configured as 16.0"

      - name: Install CocoaPods and verify Maps SDK
        script: |
          set -e
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

          if ! grep -Eq 'GoogleMaps \(10\.' Podfile.lock; then
            echo "Google Maps SDK for iOS 10.x was not installed"
            grep -E 'GoogleMaps|google_maps_flutter_ios' Podfile.lock || true
            exit 1
          fi

          grep -E 'GoogleMaps|google_maps_flutter_ios' Podfile.lock
          cd ..

      - name: Build iOS without code signing
        script: |
          set -e
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=GOOGLE_WEB_SERVICES_KEY="$GOOGLE_WEB_SERVICES_KEY"

      - name: Package unsigned IPA
        script: |
          set -e

          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Runner.app was not found"
            exit 1
          fi

          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload

          cp -R \
            build/ios/iphoneos/Runner.app \
            build/ios/ipa/Payload/

          cd build/ios/ipa
          zip -qry ../mili-taxi-driver-unsigned.ipa Payload

          echo "Driver unsigned IPA created"

    artifacts:
      - build/ios/mili-taxi-driver-unsigned.ipa
